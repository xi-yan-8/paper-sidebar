<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paper Sidebar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 13px;
    }
    .header {
      padding: 12px 16px;
      background: #181825;
      border-bottom: 1px solid #313244;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .status { width: 8px; height: 8px; border-radius: 50%; background: #f38ba8; flex-shrink: 0; }
    .status.connected { background: #a6e3a1; }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      max-width: 92%;
      padding: 10px 12px;
      border-radius: 10px;
      line-height: 1.6;
      word-break: break-word;
    }
    .message.user {
      align-self: flex-end;
      background: #313244;
    }
    .message.assistant {
      align-self: flex-start;
      background: transparent;
      border: 1px solid #45475a;
    }
    .message.assistant p { margin: 6px 0; }
    .message.assistant p:first-child { margin-top: 0; }
    .message.assistant p:last-child { margin-bottom: 0; }
    .message.assistant code {
      background: #313244;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
    }
    .message.assistant pre {
      background: #11111b;
      padding: 10px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 6px 0;
    }
    .message.assistant pre code {
      background: none;
      padding: 0;
    }
    .message.assistant ul, .message.assistant ol {
      padding-left: 18px;
      margin: 4px 0;
    }
    .message.assistant blockquote {
      border-left: 3px solid #89b4fa;
      padding-left: 10px;
      color: #a6adc8;
      margin: 6px 0;
    }
    .typing { color: #a6e3a1; font-size: 11px; padding: 4px 12px; }
    .input-area {
      padding: 10px;
      border-top: 1px solid #313244;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .input-area input {
      flex: 1;
      background: #313244;
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      color: #cdd6f4;
      font-size: 13px;
      outline: none;
    }
    .input-area input::placeholder { color: #6c7086; }
    .input-area button {
      background: #89b4fa;
      color: #1e1e2e;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
    }
    .input-area button:disabled { opacity: 0.5; cursor: default; }
    .info-banner {
      margin: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 11px;
      text-align: center;
    }
    .info-banner.disconnected {
      background: #3b1d1d;
      color: #f38ba8;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="status" id="status"></span>
    <span>Claude Paper Assistant</span>
  </div>
  <div id="messages" class="messages">
    <div class="info-banner disconnected" id="banner">
      未连接到本地服务<br>
      <small>请运行 start.bat 启动服务</small>
    </div>
  </div>
  <div class="input-area">
    <input type="text" id="input" placeholder="输入问题，或选中PDF文字后右键发送..." />
    <button id="sendBtn" disabled>发送</button>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
